name: Tests

on:
  push:
    branches:
      - "master"
      - "dev"
      - "quality-scale"
  pull_request:
    branches:
      - "master"

permissions: {}

jobs:
  pytest:
    name: "Tests"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install requirements
        run: python3 -m pip install -r requirements.txt

      - name: Install HA component dependencies
        run: |
          python3 -c "
          import json, subprocess, pathlib, importlib.util
          ha = pathlib.Path(importlib.util.find_spec('homeassistant').origin).parent
          for comp in ['bluetooth', 'usb', 'bluetooth_adapters']:
              manifest = ha / 'components' / comp / 'manifest.json'
              if manifest.exists():
                  reqs = json.loads(manifest.read_text()).get('requirements', [])
                  if reqs:
                      subprocess.check_call(['pip', 'install'] + reqs)
          "

      - name: Run tests
        run: python3 -m pytest tests/ --cov=custom_components/ooler --cov-report=term-missing -W error::RuntimeWarning
