# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py313"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN001",  # Missing type annotation for function argument
    "ANN002",  # Missing type annotation for *args
    "ANN003",  # Missing type annotation for **kwargs
    "ANN201",  # Missing return type annotation for public function
    "ANN202",  # Missing return type annotation for private function
    "ANN204",  # Missing return type annotation for special method
    "ANN401",  # Dynamically typed expressions (typing.Any) are disallowed
    "ARG001",  # Unused function argument (often required by callback interfaces)
    "ARG002",  # Unused method argument (often required by callback interfaces)
    "BLE001",  # Do not catch blind exception
    "D203",    # no-blank-line-before-class (incompatible with formatter)
    "D212",    # multi-line-summary-first-line (incompatible with formatter)
    "D400",    # First line should end with a period
    "D401",    # First line should be in imperative mood
    "D404",    # First word of the docstring should not be "This"
    "D415",    # First line should end with a period, question mark, or exclamation point
    "EM101",   # Exception must not use a string literal
    "ERA001",  # Found commented-out code
    "FBT003",  # Boolean positional value in function call
    "TC001",   # Move stdlib import into a type-checking block
    "TC002",   # Move third-party import into a type-checking block
    "TRY003",  # Avoid specifying long messages outside the exception class
    "COM812",  # incompatible with formatter
    "ISC001",  # incompatible with formatter
]

[lint.per-file-ignores]
"custom_components/**" = [
    "S101",   # asserts used for type narrowing (idiomatic HA pattern)
]
"tests/**" = [
    "S101",    # Use of assert detected (normal in pytest)
    "PT018",   # Assertion should be broken down into multiple parts
    "D102",    # Missing docstring in public method
    "D103",    # Missing docstring in public function
    "D107",    # Missing docstring in __init__
    "E501",    # Line too long (prose comments in test fixtures)
    "SLF001",  # Private member access — necessary for testing internals
    "PLR2004", # Magic values — clearer in test assertions than constants
    "FBT",     # Boolean arguments — fine in test helpers
    "ARG",     # Unused arguments — common in mock lambdas and fixtures
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25
